name: Generate Snake contribution graph

on:
  schedule:
    - cron: "0 */12 * * *"
  workflow_dispatch:
  push:
    branches:
    - main

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    
    steps:
      - name: generate github-contribution-grid-snake.svg
        uses: Platane/snk/svg-only@v3
        with:
          github_user_name: ${{ github.repository_owner }}
          outputs: |
            dist/github-contribution-grid-snake.svg?palette=github-dark&color_snake=#FF003C&color_dots=#1a1a1b,#202022,#ff003c,#ff2e63,#ff5d8f
            dist/github-contribution-grid-snake-dark.svg?palette=github-dark&color_snake=#FF003C&color_dots=#1a1a1b,#202022,#ff003c,#ff2e63,#ff5d8f
        env:
          GITHUB_TOKEN: ${{ secrets.METRICS_TOKEN }}
          
      - name: push github-contribution-grid-snake.svg to the output branch
        uses: crazy-max/ghaction-github-pages@v3.1.0
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.METRICS_TOKEN }}
