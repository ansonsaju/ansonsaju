<svg width="200" height="200" viewBox="0 0 200 200" fill="none" xmlns="http://www.w3.org/2000/svg">
  <style>
    .path {
      stroke: #FF003C;
      stroke-width: 2;
      stroke-linecap: round;
      opacity: 0.3;
      filter: drop-shadow(0 0 5px #FF003C);
    }
    .active {
      stroke: #FF003C;
      stroke-width: 3;
      stroke-linecap: round;
      filter: drop-shadow(0 0 8px #FF003C);
      stroke-dasharray: 1000;
      stroke-dashoffset: 1000;
      animation: dash 3s linear infinite;
    }
    .laser {
      fill: url(#laserGradient);
      animation: scan 2s ease-in-out infinite;
    }
    @keyframes dash {
      to {
        stroke-dashoffset: 0;
      }
    }
    @keyframes scan {
      0%, 100% { transform: translateY(0); opacity: 0; }
      50% { transform: translateY(160px); opacity: 1; }
    }
    .frame {
      stroke: #FF003C;
      stroke-width: 1;
      opacity: 0.5;
    }
  </style>
  <defs>
    <linearGradient id="laserGradient" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FF003C" stop-opacity="0"/>
      <stop offset="50%" stop-color="#FF003C" stop-opacity="1"/>
      <stop offset="100%" stop-color="#FF003C" stop-opacity="0"/>
    </linearGradient>
  </defs>
  
  <!-- Outer Frame -->
  <rect x="20" y="20" width="160" height="160" rx="10" class="frame" fill="none"/>
  <path d="M40 20 H20 V40" class="frame" stroke-width="4"/>
  <path d="M160 20 H180 V40" class="frame" stroke-width="4"/>
  <path d="M40 180 H20 V160" class="frame" stroke-width="4"/>
  <path d="M160 180 H180 V160" class="frame" stroke-width="4"/>

  <!-- Fingerprint Loops -->
  <path d="M100 60 C 80 60, 70 80, 70 100 C 70 120, 80 140, 100 140 C 120 140, 130 120, 130 100" class="path"/>
  <path d="M100 75 C 90 75, 85 85, 85 100 C 85 115, 90 125, 100 125" class="path"/>
  <path d="M100 90 C 95 90, 92 95, 92 100" class="active"/>
  <path d="M100 45 C 70 45, 55 70, 55 100 C 55 130, 70 155, 100 155 C 130 155, 145 130, 145 100" class="active"/>

  <!-- Scanning Laser -->
  <rect x="25" y="25" width="150" height="2" class="laser"/>
</svg>
